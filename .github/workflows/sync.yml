name: Sync Baekjoon Solutions

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at 9AM KST (midnight UTC)
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to push commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install requests beautifulsoup4 selenium

      - name: Verify Chromium paths
        run: |
          which chromium-browser
          which chromedriver
          chromium-browser --version
          chromedriver --version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run sync script
        env:
          BOJ_ID: ${{ secrets.BOJ_ID }}
          BOJ_PASSWORD: ${{ secrets.BOJ_PASSWORD }}
        run: python sync.py

      - name: Save state
        run: |
          git add state.json
          git diff --staged --quiet || git commit -m "Update state"
          git push
