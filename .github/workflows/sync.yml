name: Sync Baekjoon Solutions

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at 9AM KST (midnight UTC)
  workflow_dispatch:      # Allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 undetected-chromedriver

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run sync script
        env:
          BOJ_ID: ${{ secrets.BOJ_ID }}
          BOJ_PASSWORD: ${{ secrets.BOJ_PASSWORD }}
        run: python sync.py

      - name: Save state
        run: |
          git add state.json
          git diff --staged --quiet || git commit -m "Update state"
          git push